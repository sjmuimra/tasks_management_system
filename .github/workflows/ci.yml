name: Backend CI

on:
  push:
    branches:
      - master
      - 'TaskManagementSystem/**'
  pull_request:
    branches:
      - master

jobs:

  # ─── Stage 1a: Code Style ───────────────────────────────────────────────────
  code-style:
    name: Code Style (Pint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Check code style
        run: vendor/bin/pint --test

  # ─── Stage 1b: Security Audit ───────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Check for known vulnerabilities
        run: composer audit

  # ─── Stage 1c: Static Analysis ──────────────────────────────────────────────
  static-analysis:
    name: Static Analysis (Larastan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Run static analysis
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M

  # ─── Stage 2: Tests ─────────────────────────────────────────────────────────
  # Runs only when ALL three Stage 1 jobs pass.
  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: [code-style, security, static-analysis]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: tasks_manager_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo, pdo_mysql, redis
          coverage: xdebug
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-
      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist
      - name: Copy .env.testing
        run: cp .env.testing .env
      - name: Generate application key
        run: php artisan key:generate --env=testing
      - name: Run migrations
        run: php artisan migrate --env=testing --force
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: tasks_manager_test
          DB_USERNAME: root
          DB_PASSWORD: root
      - name: Run tests with coverage
        run: php artisan test --env=testing --coverage --min=80
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: tasks_manager_test
          DB_USERNAME: root
          DB_PASSWORD: root
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379

  # ─── Stage 3: Docker Build ───────────────────────────────────────────────────
  # Runs only when tests pass.
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f docker/php/Dockerfile -t taskflow-api:ci .
